# SabaiBill on Render (single Web service: API + static SPA)
# Docs: https://render.com/docs/blueprint-spec
#
# Free tier: cold start can take ~1 min when idle; SQLite on ephemeral disk may reset on redeploy.
# For persistent DB on Render you need a paid plan + disk — see README.md (Deploy section).
#
# Build: ไม่ต้องตั้ง VITE_API_URL ถ้า API กับ SPA อยู่ service เดียวกัน (แอปใช้ window.location.origin → ไม่โดน CORS)
# ถ้าแยก API คนละ service: ตั้ง VITE_API_URL ที่ Build env และบน API ตั้ง FRONTEND_URL / CORS_ALLOWED_ORIGINS = URL หน้าเว็บ

services:
  - type: web
    name: sabai-bill
    runtime: node
    plan: free
    # Inline build (avoids Dashboard drift + npm script nesting). Paste this in Render if not using Blueprint sync.
    buildCommand: npm ci && npm ci --prefix client && npm run build --prefix client && npx prisma generate
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
