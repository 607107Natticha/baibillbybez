# SabaiBill on Render (single Web service: API + static SPA)
# Docs: https://render.com/docs/blueprint-spec
#
# Persistent SQLite: Render allows persistent disks only on PAID web services
# (not Free). See https://render.com/docs/disks
#
# Before first successful client build, set in the Render dashboard (Build environment):
#   VITE_API_URL = https://<your-service-name>.onrender.com
# Then trigger a new deploy so the SPA calls the correct API origin.

services:
  - type: web
    name: sabai-bill
    runtime: node
    # Starter+ required for disk; Free tier cannot attach persistent disks.
    plan: starter
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 5
    buildCommand: npm run render-build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: JWT_SECRET
        generateValue: true
