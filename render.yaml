# SabaiBill on Render (single Web service: API + static SPA)
# Docs: https://render.com/docs/blueprint-spec
#
# Free tier: cold start can take ~1 min when idle; SQLite on ephemeral disk may reset on redeploy.
# For persistent DB on Render you need a paid plan + disk — see DEPLOY.md section 4.1.
#
# Before first successful client build, set in the Render dashboard (Build environment):
#   VITE_API_URL = https://<your-service-name>.onrender.com
# Then trigger a new deploy so the SPA calls the correct API origin.

services:
  - type: web
    name: sabai-bill
    runtime: node
    plan: free
    # Inline build (avoids Dashboard drift + npm script nesting). Paste this in Render if not using Blueprint sync.
    buildCommand: npm ci && npm ci --prefix client && npm run build --prefix client && npx prisma generate
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
